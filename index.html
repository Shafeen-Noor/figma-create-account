<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Create Account</title>
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-cover bg-center"
    style="background-image: url(&quot;./assets/Background.svg&quot;)"
  >
    <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-10">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-semibold opacity-80">Create an Account</h1>
        <p class="mt-2 opacity-80">Create a account to continue</p>
      </div>

      <form class="space-y-6">
        <div>
          <label class="block mb-2 text-sm opacity-80"> Email address: </label>
          <input
            type="email"
            placeholder="esteban_schiller@gmail.com"
            class="w-full p-3.5 bg-gray-100 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>

        <div>
          <label class="block mb-2 text-sm opacity-80"> Username </label>
          <input
            type="text"
            placeholder="Username"
            class="w-full p-3.5 bg-gray-100 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>

        <div>
          <div class="flex justify-between mb-2">
            <label class="text-sm opacity-80"> Password </label>
            <a href="#" class="text-sm opacity-60"> Forget Password? </a>
          </div>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full p-3.5 bg-gray-100 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>

        <div class="flex items-center gap-2">
          <input
            type="checkbox"
            class="w-4 h-4 rounded border border-gray-300 appearance-none relative cursor-pointer checked:bg-white checked:border-gray-900 before:content-[''] before:absolute before:hidden checked:before:block before:w-[0.35rem] before:h-[0.65rem] before:border-b-2 before:border-r-2 before:border-black before:rotate-45 before:left-1 before:top-0"
          />
          <label class="text-sm text-gray-600">
            I accept terms and conditions
          </label>
        </div>

        <button
          type="submit"
          class="w-full bg-[#4880FF] text-white py-3 rounded-xl font-medium transition"
        >
          Sign Up
        </button>

        <p class="text-center text-gray-500 text-sm">
          Already have an account?
          <a href="#" class="text-[#4880FF] underline"> Login </a>
        </p>
      </form>
    </div>
  </body>
</html>
